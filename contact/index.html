<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTRON GLOBAL 문의하기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="subpage-header">
      <div class="subpage-header-inner">
        <a href="/" class="back-link">← 뒤로가기</a>
        <a href="/" class="logo">
          <img src="/Crop.jpeg" alt="INTRON GLOBAL 로고" class="logo-img">
          <span class="logo-text">INTRON GLOBAL</span>
        </a>

        <nav class="subpage-nav">
          <div class="lang-select">
            <a href="/contact/" class="kr active">KR</a>
            <span>|</span>
            <a href="/contact-en/" class="en">EN</a>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-main">
      <section class="section service-hero contact-page">
        <h1>문의하기</h1>
        <p class="service-lead">
          판매·무역·수출입 관련 문의 내용을 아래 양식으로 보내주시면 확인 후 회신드리겠습니다.
        </p>
      </section>

      <section class="section contact-page">
        <form id="contactForm" class="contact-form">
          <input type="text" name="name" placeholder="이름 / 회사명" maxlength="80" required />
          <input type="email" name="email" placeholder="이메일" required />
          <p class="email-note">입력하신 이메일로 회신드리므로 정확한 주소를 입력해 주세요.</p>
          <input type="text" name="subject" placeholder="문의 제목" maxlength="120" required />
          <textarea name="message" rows="6" placeholder="문의 내용을 입력해 주세요." minlength="20" maxlength="3000" required></textarea>

          <div style="display:none;">
            <input type="text" name="hp_field" autocomplete="off">
          </div>

          <label class="file-label">첨부 파일 (선택, 최대 20MB):
            <input type="file" id="attachment" name="attachment" accept=".pdf,.doc,.docx,.xls,.xlsx,.txt,.jpg,.jpeg,.png">
          </label>
          <div class="file-info" id="fileInfo" aria-live="polite"></div>

          <div class="progress" id="uploadProgress" style="display:none;">
            <div class="progress-bar" id="uploadBar" style="width:0%"></div>
          </div>

          <input type="hidden" name="attachment_url" id="attachment_url" />
          <button type="submit">보내기</button>
        </form>
      </section>
    </main>

    <!-- 푸터 -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-info">
          <strong>(주)인트론글로벌</strong><br />
          사업분야: 도매업 · 무역업(수출·수입)<br />
          주소: 경기도 용인시 기흥구 강남로 9, 503-439호(구갈동, 태평양프라자)<br />
          ✉ intron1101@gmail.com | 📠 0504-423-5748
        </div>

        <div class="footer-copy">
          © 2025 INTRON GLOBAL CO., LTD. All rights reserved.
        </div>
      </div>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <script>
    emailjs.init("S_pZX4esOTmL2yED9");

    const MAX_FILE_SIZE = 20 * 1024 * 1024;
    const ALLOWED_TYPES = ["application/pdf","application/msword","application/vnd.openxmlformats-officedocument.wordprocessingml.document","application/vnd.ms-excel","application/vnd.openxmlformats-officedocument.spreadsheetml.sheet","image/jpeg","image/png","text/plain"];
    const CONTACT_HISTORY_KEY = "intron_contact_history";
    const CONTACT_COOLDOWN_MS = 60 * 1000;
    const DUPLICATE_BLOCK_MS = 24 * 60 * 60 * 1000;
    const SPAM_PATTERNS = [
      /(?:검색\s*엔진\s*최적화|\bSEO\b)/i,
      /(?:백링크|게스트\s*포스트|웹사이트\s*트래픽)/i,
      /(?:도박|카지노|가상\s*화폐|암호\s*화폐)/i
    ];

    function createContentHash(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(36);
    }

    function getContactHistory() {
      try {
        return JSON.parse(localStorage.getItem(CONTACT_HISTORY_KEY)) || {};
      } catch (_) {
        return {};
      }
    }

    function saveContactHistory(contentHash) {
      try {
        localStorage.setItem(CONTACT_HISTORY_KEY, JSON.stringify({
          sentAt: Date.now(),
          contentHash
        }));
      } catch (_) {
        // 저장소를 사용할 수 없는 환경에서는 전송 자체를 막지 않는다.
      }
    }

    function validateInquiry(form) {
      const subject = form.subject.value.trim();
      const message = form.message.value.trim();
      const combined = `${subject} ${message}`;
      const normalized = combined.toLowerCase().replace(/\s+/g, " ");
      const contentHash = createContentHash(normalized);
      const history = getContactHistory();
      const elapsed = Date.now() - Number(history.sentAt || 0);

      if (message.length < 20) {
        return { error: "문의 내용을 20자 이상 입력해 주세요." };
      }
      if ((combined.match(/(?:https?:\/\/|www\.)/gi) || []).length > 1) {
        return { error: "링크는 1개까지만 입력할 수 있습니다." };
      }
      if (SPAM_PATTERNS.some((pattern) => pattern.test(combined))) {
        return { error: "광고성 또는 스팸성 문의는 전송할 수 없습니다." };
      }
      if (elapsed < CONTACT_COOLDOWN_MS) {
        return { error: "연속 전송은 제한됩니다. 잠시 후 다시 시도해 주세요." };
      }
      if (history.contentHash === contentHash && elapsed < DUPLICATE_BLOCK_MS) {
        return { error: "동일한 문의는 24시간 이내에 다시 전송할 수 없습니다." };
      }
      return { contentHash };
    }

    async function uploadFileToFileIo(file) {
      if (!file) return null;
      const fd = new FormData();
      fd.append("file", file);
      const res = await fetch("https://file.io", { method: "POST", body: fd });
      const json = await res.json();
      if (json && json.success && json.link) return json.link;
      if (json && json.link) return json.link;
      throw new Error("File upload failed");
    }

    document.getElementById("attachment").addEventListener("change", function () {
      const file = this.files[0];
      const info = document.getElementById("fileInfo");
      if (!file) {
        info.textContent = "";
        return;
      }
      if (file.size > MAX_FILE_SIZE) {
        info.textContent = "파일 용량은 최대 20MB까지 가능합니다.";
        this.value = "";
        return;
      }
      if (!ALLOWED_TYPES.includes(file.type)) {
        info.textContent = "지원하지 않는 파일 형식입니다.";
        this.value = "";
        return;
      }
      info.textContent = `선택됨: ${file.name} (${Math.round(file.size / 1024)} KB)`;
    });

    document.getElementById("contactForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const form = this;

      if (form.hp_field.value.trim() !== "") {
        alert("전송 중 오류가 발생했습니다. (Code: 101)");
        return;
      }

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const validation = validateInquiry(form);
      if (validation.error) {
        alert(validation.error);
        return;
      }

      if (!confirm("전송 후에는 수정 또는 취소가 어렵습니다.\n\n내용을 다시 확인하셨나요?\n지금 전송하시겠습니까?")) {
        return;
      }

      const submitBtn = form.querySelector("button[type='submit']");
      const originalText = submitBtn.textContent;
      submitBtn.disabled = true;
      submitBtn.textContent = "전송 중...";

      try {
        let attachmentUrl = "";
        const fileInput = document.getElementById("attachment");
        if (fileInput && fileInput.files.length) {
          const file = fileInput.files[0];
          if (file.size > MAX_FILE_SIZE) throw new Error("File exceeds size limit");
          if (!ALLOWED_TYPES.includes(file.type)) throw new Error("Unsupported file type");
          document.getElementById("uploadProgress").style.display = "block";
          document.getElementById("uploadBar").style.width = "30%";
          attachmentUrl = await uploadFileToFileIo(file);
          document.getElementById("uploadBar").style.width = "100%";
        }

        const payload = {
          name: form.name.value,
          email: form.email.value,
          subject: form.subject.value,
          message: form.message.value,
          attachment_url: attachmentUrl
        };

        await emailjs.send("INTRON MAIL", "template_ahovfta", payload);
        saveContactHistory(validation.contentHash);
        alert("문의가 정상적으로 전송되었습니다.");
        form.reset();
        document.getElementById("fileInfo").textContent = "";
        document.getElementById("uploadProgress").style.display = "none";
      } catch (err) {
        console.error(err);
        alert("전송에 실패했습니다. 잠시 후 다시 시도해 주세요.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>

  <script>
    document.addEventListener("contextmenu", (event) => event.preventDefault());
  </script>
</body>
</html>
